<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>zero cutta game</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <nav>
    <ul>
      <li>zero cutta game</li>
    </ul>
  </nav>

  <div class="gamebox">
    <div class="mainbox">
      <div class="cut"></div>
      <div class="box bt-0 bl-0"><span class="text"></span></div>
      <div class="box bt-0"><span class="text"></span></div>
      <div class="box bt-0 br-0"><span class="text"></span></div>
      <div class="box bl-0"><span class="text"></span></div>
      <div class="box"><span class="text"></span></div>
      <div class="box br-0"><span class="text"></span></div>
      <div class="box bl-0 bb-0"><span class="text"></span></div>
      <div class="box bb-0"><span class="text"></span></div>
      <div class="box bb-0 br-0"><span class="text"></span></div>
      <div class="fire">
        <img src="Fire Night Sticker by haenaillust for iOS & Android _ GIPHY.gif" alt="" />
      </div>
    </div>
    
    <div class="Info">
      <h1>Welcome to zero cutta game
        by vikas singh
      </h1>
      <div>
        <span class="information">Turn for X</span>
        <button id="reset">Reset</button>
      </div>
      <div class="gif">
        <img src="excited.gif" alt="spiderman" />
      </div>
    </div>
  </div>
  <footer>
    <h1> copyright: zero cutta game
      by vikas singh &copy company right.
    </h1>
  </footer>
  <script src="script.js"></script>

</body>

</html>
